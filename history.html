  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --card-bg: rgba(255, 255, 255, 0.82);
      --card-border: rgba(255, 255, 255, 0.5);
      --card-hover-border: rgba(255, 255, 255, 0.7);
      --card-shadow: rgba(10, 40, 80, 0.15);
      --text-primary: #0c2d48;
      --text-secondary: #2e5a78;
      --text-muted: #5a8aaa;

      --ogp-lavender: #b09ddb;
      --text-on-ocean: rgba(255, 255, 255, 0.65);
      --text-on-ocean-bright: rgba(255, 255, 255, 0.9);

    body {
      font-family: 'Zen Kaku Gothic New', 'Montserrat', sans-serif;
      background: linear-gradient(180deg, #2980b9 0%, #1a6d8a 15%, #1b5e7a 35%, #17526e 55%, #144a63 75%, #0f3d55 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 40px;
      gap: 20px;
      color: var(--text-primary);

      overflow-x: hidden;

    body::before {
      content: '';
      position: fixed;
      top: -20%; left: -10%;
      width: 120%; height: 60%;
      background:
        radial-gradient(ellipse 50% 40% at 30% 20%, rgba(255,255,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 35% at 65% 15%, rgba(255,255,255,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 35%, rgba(106,180,226,0.06) 0%, transparent 60%);
      animation: caustics 15s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes caustics {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
      33% { transform: translate(15px, 5px) scale(1.02); opacity: 0.85; }
      66% { transform: translate(-10px, 8px) scale(0.98); opacity: 0.95; }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        radial-gradient(circle at 18% 75%, rgba(255,255,255,0.35) 2px, transparent 2px),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,0.25) 3px, transparent 3px),
        radial-gradient(circle at 42% 45%, rgba(255,255,255,0.2) 1.5px, transparent 1.5px),

      background-size: 260px 260px, 340px 340px, 300px 300px, 380px 380px, 320px 320px, 280px 280px;
      animation: bubbleDrift 28s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes bubbleDrift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(6px, -12px); }
      50% { transform: translate(-3px, -25px); }
      75% { transform: translate(10px, -18px); }

    .back-btn {

    /* Summary cards */

    /* History list */

      flex-direction: column;

    /* Depth badge */

    .stage-5 { background: rgba(0,31,68,0.25);   border: 1px solid rgba(79,172,254,0.2); }
    .stage-6 { background: rgba(0,14,34,0.3);    border: 1px solid rgba(79,172,254,0.15); }
    .stage-7 { background: rgba(0,5,17,0.35);    border: 1px solid rgba(100,100,180,0.2); }

    .stage-old { background: rgba(80,80,80,0.15); border: 1px solid rgba(150,150,150,0.2); }

    .card-depth.no-data {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Card info */
    .card-info { min-width: 0; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;

    .card-score {
      font-size: 22px;

    .card-stage-name {

    .card-depth {

    .card-stat span { color: var(--text-primary); font-weight: 600; }

    .diff-badge {

    .diff-easy   { background: rgba(76,175,80,0.2);  color: #4caf50; }

    /* Date */

      .summary { grid-template-columns: repeat(2, 1fr); }
      .history-card { grid-template-columns: auto 1fr; }

  </style></head>
<body>

  <div class="page-header">
    <button class="back-btn" onclick="location.href='index.html'">← メニュー</button>
    <h1 class="page-title">📋 プレイ履歴</h1>
    <button class="clear-btn" onclick="clearHistory()">🗑 履歴を削除</button>
  </div>

  <!-- 統計サマリー -->
  <div class="summary">
    <div class="summary-card">
      <div class="summary-label">TOTAL PLAYS</div>
      <div class="summary-value" id="statTotal">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">BEST SCORE</div>
      <div class="summary-value" id="statBest">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">MAX DEPTH</div>
      <div class="summary-value" id="statDepth">0m</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">DEEPEST STAGE</div>
      <div class="summary-value" id="statStage" style="font-size:16px;">—</div>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="easy">易しい</button>
    <button class="filter-btn" data-filter="medium">普通</button>
    <button class="filter-btn" data-filter="hard">難しい</button>
  </div>

  <!-- 履歴リスト -->
  <div class="history-list" id="historyList"></div>

  <footer class="site-footer">
    <div style="margin-bottom: 8px; text-align: center;">
      <a href="about_yubimoji.html">指文字とは？</a>
      <span class="footer-sep">|</span>
      <a href="about_signdiver.html">Sign Diverとは？</a>
      <span class="footer-sep">|</span>
      <a href="terms.html">利用規約</a>
      <span class="footer-sep">|</span>
      <a href="privacy.html">プライバシーポリシー</a>
    </div>
    <a href="https://www.youtube.com/@Katsuo_Shuwa_Doga" target="_blank" rel="noopener noreferrer">
      <span class="footer-icon">▶</span>
      <span>@KatsuoShuwaDoga</span>
    </a>
  </footer>

  <script>
    // ステージ定義を stage.json から取得
    let LEVELS = [];

    // フォールバック用（fetch失敗時）
    const FALLBACK_LEVELS = [
      { minChars: 0, depth: 0, name: '浅瀬', icon: '🏖️', stageClass: 'stage-0' }
    ];

    async function initStages() {
      try {
        const res = await fetch(`./data/stage.json?v=${Date.now()}`);
        const data = await res.json();
        LEVELS = data.stages;
      } catch (e) {
        console.error('stage.json 読み込みエラー:', e);
        LEVELS = FALLBACK_LEVELS;
      }
    }

    function getStage(totalChars) {
      let lv = 0;
      for (let i = 0; i < LEVELS.length; i++) {
        if ((totalChars || 0) >= LEVELS[i].minChars) lv = i;
      }
      return LEVELS[lv];
    }

    function getDepthM(totalChars) {
      const chars = totalChars || 0;
      const lv = getStageIndex(chars);
      const L = LEVELS[lv];
      const nextL = LEVELS[lv + 1];
      if (nextL) {
        const progress = (chars - L.minChars) / (nextL.minChars - L.minChars);
        return Math.round(L.depth + (nextL.depth - L.depth) * Math.min(1, progress));
      }
      return Math.round(L.depth + (chars - L.minChars) * 15);
    }

    function getStageIndex(chars) {
      let lv = 0;
      for (let i = 0; i < LEVELS.length; i++) {
        if ((chars || 0) >= LEVELS[i].minChars) lv = i;
      }
      return lv;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${y}/${mo}/${day}<br>${h}:${mi}`;
    }

    function diffLabel(d) {
      if (d === 'easy')   return '<span class="diff-badge diff-easy">易しい</span>';
      if (d === 'medium') return '<span class="diff-badge diff-medium">普通</span>';
      if (d === 'hard')   return '<span class="diff-badge diff-hard">難しい</span>';
      return '';
    }

    let allScores = [];
    let currentFilter = 'all';

    function loadAndRender() {
      allScores = JSON.parse(localStorage.getItem('allScores') || '[]')
                    .reverse(); // 新しい順

      // サマリー計算
      if (allScores.length > 0) {
        const bestScore = Math.max(...allScores.map(s => s.score || 0));
        const maxChars  = Math.max(...allScores.map(s => s.totalChars || 0));
        const deepStage = getStage(maxChars);
        const maxDepth  = getDepthM(maxChars);

        document.getElementById('statTotal').textContent = allScores.length;
        document.getElementById('statBest').textContent  = bestScore.toLocaleString();
        document.getElementById('statDepth').textContent = maxDepth.toLocaleString() + 'm';
        document.getElementById('statStage').textContent = deepStage.icon + ' ' + deepStage.name;
      }

      renderList();
    }

    function renderList() {
      const list = document.getElementById('historyList');
      const filtered = currentFilter === 'all'
        ? allScores
        : allScores.filter(s => s.difficulty === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌊</div>
            <p>まだ履歴がありません。<br>ゲームをプレイして深海を目指そう！</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map((s, i) => {
        const stage   = s.totalChars != null ? getStage(s.totalChars) : null;
        const depth   = s.totalChars != null ? getDepthM(s.totalChars) : null;
        const chars   = s.totalChars != null ? s.totalChars : null;
        const speed   = s.speed || '0.00';
        const cleared = s.cleared || 0;
        const tl      = s.timeLimit ? s.timeLimit + '秒' : '—';

        const badgeHtml = stage
          ? `<div class="depth-badge ${stage.stageClass}">
               <div class="depth-icon">${stage.icon}</div>
               <div class="depth-label">${stage.name}</div>
             </div>`
          : `<div class="depth-badge stage-old">
               <div class="depth-icon">📦</div>
               <div class="depth-label">旧データ</div>
             </div>`;

        const depthHtml = depth != null
          ? `<span class="card-depth">▼ ${depth.toLocaleString()}m</span>`
          : `<span class="card-depth no-data">深度データなし</span>`;

        const charsHtml = chars != null ? chars : '<span style="opacity:0.4">—</span>';

        const titleHtml = s.titleEmoji
          ? `<span class="card-title-badge">${s.titleEmoji} ${s.titleText}</span>`
          : `<span class="card-title-badge old-title">—</span>`;

        return `
          <div class="history-card">
            ${badgeHtml}
            <div class="card-info">
              <div class="card-top">
                <span class="card-score">${(s.score || 0).toLocaleString()}点</span>
                ${diffLabel(s.difficulty)}
                ${titleHtml}
                ${depthHtml}
              </div>
              <div class="card-stats">
                <span>クリア: <span>${cleared}問</span></span>
                <span>文字数: <span>${charsHtml}</span></span>
                <span>速度: <span>${speed} 文字/秒</span></span>
                <span>制限: <span>${tl}</span></span>
              </div>
            </div>
            <div class="card-date">${formatDate(s.date)}</div>
          </div>`;
      }).join('');
    }

    // フィルターボタン
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });

    // 履歴削除
    function clearHistory() {
      if (!confirm('履歴をすべて削除しますか？')) return;
      localStorage.removeItem('allScores');
      location.reload();
    }

    initStages().then(() => loadAndRender());
  </script>
</body>
